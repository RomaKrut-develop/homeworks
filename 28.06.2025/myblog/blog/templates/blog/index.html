<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announce IT</title>
</head>
<body>
    <h1>First news</h1>
    
    {% for post in posts %}
    <article>
        <h2><a href="{% url 'post_detail' post.id %}">{{ post.title }}</a></h2>
        <p><em>Published: {{ post.pub_date }}</em></p>
        <p>{{ post.short_text }}</p>
    </article>
    <hr>
    {% endfor %}
</body>
</html>
