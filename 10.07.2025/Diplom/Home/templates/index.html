<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Luna Theme</title>
    <style>
        body {
            background-color: #3A6EA5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Tahoma', 'Arial', sans-serif;
        }

        .window {
            width: 400px;
            background: linear-gradient(to bottom, #ECE9D8, #FFFFFF);
            border: 1px solid #003C74;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            border-radius: 6px 6px 0 0;
            overflow: hidden;
        }

        .title-bar {
            background: linear-gradient(to right, #0058B1, #3A6EA5);
            color: white;
            padding: 6px 8px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #003C74;
        }

        .title-text {
            display: flex;
            align-items: center;
        }

        .title-icon {
            width: 16px;
            height: 16px;
            margin-right: 5px;
            background-color: white;
            display: inline-block;
        }

        .window-buttons {
            display: flex;
        }

        .window-button {
            width: 22px;
            height: 20px;
            margin-left: 2px;
            background-color: #ECE9D8;
            border: 1px solid #003C74;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: black;
            cursor: default;
        }

        .window-button.close {
            background-color: #FF9D47;
            color: white;
        }

        .window-content {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            color: #003C74;
            font-weight: bold;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .status-bar {
            background-color: #ECE9D8;
            border-top: 1px solid #B5B5B5;
            padding: 4px 8px;
            font-size: 11px;
            color: #3A6EA5;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-text">
                <div class="title-icon"></div>
                Windows XP
            </div>
            <div class="window-buttons">
                <div class="window-button">_</div>
                <div class="window-button">□</div>
                <div class="window-button close">X</div>
            </div>
        </div>
        <div class="window-content">
            Hello, Windows!
        </div>
        <div class="status-bar">
            <div>Ready</div>
            <div>100%</div>
        </div>
    </div>
</body>
</html>
