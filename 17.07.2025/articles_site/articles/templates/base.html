<!DOCTYPE html>
<html>
<head>
    <title>Article Site</title>
</head>
<body>
    <header>
        {% if user.is_authenticated %}
            <p>Привет, {{ user.username }}! <a href="{% url 'logout' %}">Logout</a></p>
        {% else %}
            <p><a href="{% url 'login' %}">Войти</a> | <a href="{% url 'signup' %}">Начать</a></p>
        {% endif %}
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
